name: voltera
description: "Flutter-based mobile application UI for managing electric vehicle charging stations, bookings, charging sessions, payments, and user accounts in the Voltera ecosystem."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  dio: ^5.8.0+1
  go_router: ^16.0.0
  flutter_secure_storage: ^9.2.2

  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
