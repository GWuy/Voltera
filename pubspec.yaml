name: voltera
description: "Flutter-based mobile application UI for managing electric vehicle charging stations, bookings, charging sessions, payments, and user accounts in the Voltera ecosystem."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  dio: ^5.8.0+1
  go_router: ^16.0.0
  flutter_secure_storage: ^9.2.2

  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  pdf: ^3.13.0
  printing: ^5.15.0
  freezed_annotation: ^3.1.0
  riverpod: ^3.3.2
  flutter_riverpod: ^3.3.2
  json_annotation: ^4.12.0
  url_launcher: ^6.3.2
  url_launcher_android: ^6.3.32
  url_launcher_ios: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:

  uses-material-design: true
